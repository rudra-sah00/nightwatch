<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Watch Rudra</title>
  <style>
    :root { --bg: #f5f0e8; --fg: #1a1a1a; --accent: #ffcc00; --border: #1a1a1a; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #000; --fg: #fff; --accent: #a855f7; --border: #1a1a1a; }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--fg);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .card {
      text-align: center; max-width: 360px;
      border: 4px solid var(--border); padding: 40px 32px;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 {
      font-size: 20px; font-weight: 900; font-style: italic;
      text-transform: uppercase; letter-spacing: -0.03em; margin-bottom: 8px;
    }
    p { font-size: 13px; opacity: 0.7; line-height: 1.5; margin-bottom: 24px; }
    button {
      background: var(--accent); color: var(--border); border: 3px solid var(--border);
      padding: 12px 32px; font-weight: 900; font-size: 12px;
      text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1 id="offline-title">You're Offline</h1>
    <p id="offline-desc">Check your internet connection and try again. Downloaded content is still available in the desktop app.</p>
    <button type="button" id="offline-retry" onclick="location.reload()">Retry</button>
  </div>
  <script>
    (function(){
      var t={ar:{t:'أنت غير متصل',d:'تحقق من اتصالك بالإنترنت وحاول مرة أخرى.',r:'إعادة المحاولة'},de:{t:'Du bist offline',d:'Prüfe deine Internetverbindung und versuche es erneut.',r:'Erneut versuchen'},es:{t:'Estás sin conexión',d:'Comprueba tu conexión a internet e inténtalo de nuevo.',r:'Reintentar'},fr:{t:'Vous êtes hors ligne',d:'Vérifiez votre connexion Internet et réessayez.',r:'Réessayer'},hi:{t:'आप ऑफ़लाइन हैं',d:'अपना इंटरनेट कनेक्शन जाँचें और पुनः प्रयास करें।',r:'पुनः प्रयास'},it:{t:'Sei offline',d:'Controlla la connessione internet e riprova.',r:'Riprova'},ja:{t:'オフラインです',d:'インターネット接続を確認して、もう一度お試しください。',r:'再試行'},ko:{t:'ì¤íë¼ì¸ìëë¤',d:'ì¸í°ë· ì°ê²°ì íì¸íê³  ë¤ì ìëí´ ì£¼ì¸ì.',r:'ë¤ì ìë'},pt:{t:'Você está offline',d:'Verifique sua conexão com a internet e tente novamente.',r:'Tentar novamente'},ru:{t:'Вы офлайн',d:'Проверьте подключение к интернету и попробуйте снова.',r:'Повторить'},th:{t:'คุณออฟไลน์',d:'ตรวจสอบการเชื่อมต่ออินเทอร์เน็ตและลองอีกครั้ง',r:'ลองอีกครั้ง'},tr:{t:'Çevrimdışısınız',d:'İnternet bağlantınızı kontrol edin ve tekrar deneyin.',r:'Tekrar dene'},zh:{t:'您已离线',d:'请检查您的网络连接并重试。',r:'重试'}};
      var c=document.cookie.match(/NEXT_LOCALE=([^;]+)/);
      var l=c&&c[1]||'en';
      document.documentElement.lang=l;
      if(l==='ar')document.documentElement.dir='rtl';
      if(t[l]){
        document.getElementById('offline-title').textContent=t[l].t;
        document.getElementById('offline-desc').textContent=t[l].d;
        document.getElementById('offline-retry').textContent=t[l].r;
      }
    })();
  </script>
</body>
</html>
