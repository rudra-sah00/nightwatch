name: Manual Deploy to Vercel

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

env:
  VERCEL_ORG_ID: team_sNQdK4w7XK9YIv4v71MGY8ea
  VERCEL_PROJECT_ID: prj_GvurtLT1apyIWx5cvAa4BfLNQNni
  NEXT_PUBLIC_AGORA_APP_ID: ${{ secrets.NEXT_PUBLIC_AGORA_APP_ID }}


jobs:
  lint-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack (for pnpm)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome Check (Lint & Format)
        run: pnpm check

      - name: Run TypeScript check
        run: pnpm type-check

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NODE_ENV: ${{ secrets.NODE_ENV }}
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
          NEXT_PUBLIC_AGORA_APP_ID: ${{ secrets.NEXT_PUBLIC_AGORA_APP_ID }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_CF_WORKER_URL: ${{ secrets.NEXT_PUBLIC_CF_WORKER_URL }}

      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: |
          # Retry logic for flaky uploads
          set +e
          for i in 1 2 3; do
            echo "Deployment attempt $i..."
            OUTPUT=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
            DEPLOY_STATUS=$?
            echo "$OUTPUT"
            if [ $DEPLOY_STATUS -eq 0 ]; then
              # Extract just the URL (last https:// line from output)
              URL=$(echo "$OUTPUT" | grep -oE 'https://[^ ]+\.vercel\.app' | tail -1)
              break
            fi
            
            if [ $i -lt 3 ]; then
              echo "Attempt $i failed, retrying in 10s..."
              sleep 10
            fi
          done
          
          if [ $DEPLOY_STATUS -ne 0 ]; then
            echo "❌ All deployment attempts failed."
            exit 1
          fi
          
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $URL"
          set -e
