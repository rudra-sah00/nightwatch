name: Build Samsung Tizen WGT

on:
  workflow_dispatch:
  workflow_call:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Samsung Tizen TV App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Tizen Studio CLI
        run: |
          # Download Tizen Studio CLI installer
          curl -sSL https://download.tizen.org/sdk/Installer/tizen-studio_6.0/web-cli_Tizen_Studio_6.0_ubuntu-64.bin -o tizen-studio.bin
          chmod +x tizen-studio.bin
          ./tizen-studio.bin --accept-license ~/tizen-studio
          echo "$HOME/tizen-studio/tools/ide/bin" >> $GITHUB_PATH
          echo "$HOME/tizen-studio/tools" >> $GITHUB_PATH

      - name: Install TV extensions
        run: |
          ~/tizen-studio/package-manager/package-manager-cli.bin install \
            --accept-license TV-samsung-public

      - name: Create signing certificate
        run: |
          tizen certificate -a Nightwatch -p nightwatch123 -c IN -s Maharashtra -ct Mumbai -o Nightwatch -n "Rudra Sahoo" -e rudra@nightwatch.in -f nightwatch
          tizen security-profiles add -n NightwatchProfile \
            -a ~/tizen-studio-data/keystore/author/nightwatch.p12 -p nightwatch123

      - name: Sync version from package.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cd tizen
          sed -i "s/version=\"[^\"]*\"/version=\"$VERSION\"/" config.xml
          echo "Building Tizen app v$VERSION"

      - name: Build and package WGT
        run: |
          cd tizen
          tizen build-web -- .
          tizen package -t wgt -s NightwatchProfile -- .buildResult
          mv .buildResult/*.wgt .
          ls -la *.wgt

      - name: Upload WGT to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: tizen/*.wgt

      - name: Upload WGT as Artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: tizen-wgt
          path: tizen/*.wgt
          retention-days: 30
