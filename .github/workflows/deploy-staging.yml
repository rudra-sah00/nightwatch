name: Deploy Staging (Frontend)

on:
  push:
    branches: [development]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-staging

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.staging
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=https://dev-api.nightwatch.in
            NEXT_PUBLIC_WS_URL=https://dev-api.nightwatch.in
            NEXT_PUBLIC_AGORA_APP_ID=${{ secrets.STAGING_AGORA_APP_ID }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.STAGING_TURNSTILE_SITE_KEY }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_FIREBASE_VAPID_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_VAPID_KEY }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_GOOGLE_IOS_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_IOS_CLIENT_ID }}
            NEXT_PUBLIC_SPOTIFY_CLIENT_ID=${{ secrets.NEXT_PUBLIC_SPOTIFY_CLIENT_ID }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:server

      - name: Wait for Tailscale DNS
        run: |
          for i in 1 2 3 4 5; do
            if tailscale status --peers | grep -q "${{ secrets.DEPLOY_HOST }}"; then
              echo "✅ Tailscale peer resolved"
              exit 0
            fi
            echo "Waiting for Tailscale DNS... (attempt $i)"
            sleep 5
          done
          echo "❌ Tailscale DNS failed after 25s"
          tailscale status
          exit 1

      - name: Deploy to staging
        run: |
          ssh -o StrictHostKeyChecking=no rudra@${{ secrets.DEPLOY_HOST }} << 'DEPLOY'
          set -e
          cd /opt/nightwatch-staging

          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ghcr.io/${{ github.repository }}-staging:latest
          docker tag ghcr.io/${{ github.repository }}-staging:latest nightwatch-frontend-staging:latest

          docker compose -f docker-compose.staging.yml -p nightwatch-staging up -d frontend-staging --force-recreate

          echo "✅ Frontend staging deployed at https://dev.nightwatch.in"
          DEPLOY
