name: Build Tauri Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Force LF line endings
        run: git config --global core.autocrlf false

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (for pnpm)
        run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome Check
        run: pnpm check

      - name: Run TypeScript check
        run: pnpm type-check

      - name: Run unit tests
        run: pnpm test

  # ===========================================================================
  # Desktop builds (macOS, Windows, Linux)
  # ===========================================================================
  build-desktop:
    name: Desktop — ${{ matrix.os }}
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Force LF line endings
        run: git config --global core.autocrlf false

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (for pnpm)
        run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Inject Production Secrets
        shell: bash
        run: |
          sed -i.bak "s#1234567890123456789#${{ secrets.DISCORD_CLIENT_ID }}#g" src-tauri/src/commands/discord.rs
          rm -f src-tauri/src/commands/discord.rs.bak

      - name: Delete existing release assets for this platform
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          case "${{ matrix.os }}" in
            macos-latest)  PATTERNS=("arm64.dmg" "aarch64.dmg" "x64.dmg") ;;
            windows-latest) PATTERNS=(".msi" ".exe") ;;
            ubuntu-latest)  PATTERNS=(".AppImage" "_amd64.deb") ;;
          esac
          for pattern in "${PATTERNS[@]}"; do
            gh release view "$TAG" --json assets --jq ".assets[].name" 2>/dev/null | grep "$pattern" | while read -r name; do
              echo "Deleting stale asset: $name"
              gh release delete-asset "$TAG" "$name" --yes 2>/dev/null || true
            done
          done

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Publish to GitHub Releases
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: 'Desktop & Mobile release'
          releaseDraft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Mobile — Android (APK)
  # ===========================================================================
  build-android:
    name: Mobile — Android
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (for pnpm)
        run: corepack enable

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: android-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: android-cargo-

      - name: Inject Production Secrets
        run: |
          sed -i "s#1234567890123456789#${{ secrets.DISCORD_CLIENT_ID }}#g" src-tauri/src/commands/discord.rs

      - name: Initialize Tauri Android
        run: npx tauri android init

      - name: Build Android APK
        run: npx tauri android build --apk
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Upload Android APK
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Mobile — iOS (IPA, unsigned)
  # ===========================================================================
  build-ios:
    name: Mobile — iOS
    needs: quality
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (for pnpm)
        run: corepack enable

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ios-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ios-cargo-

      - name: Inject Production Secrets
        run: |
          sed -i.bak "s#1234567890123456789#${{ secrets.DISCORD_CLIENT_ID }}#g" src-tauri/src/commands/discord.rs
          rm -f src-tauri/src/commands/discord.rs.bak

      - name: Initialize Tauri iOS
        run: npx tauri ios init

      - name: Build iOS (Simulator — unsigned)
        run: npx tauri ios build

      - name: Upload iOS artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: src-tauri/gen/apple/build/**/*.app
          retention-days: 30
