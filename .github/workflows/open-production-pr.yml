name: Open Production PR

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Production PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          gh pr create \
            --base production \
            --head main \
            --title "Deploy: Release $VERSION" \
            --body "Promoting **$VERSION** to Production. Merge this to deploy." \
            || echo "PR already exists"
