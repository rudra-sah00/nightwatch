name: Release & Deploy Frontend

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - '**.md'

permissions:
  contents: write
  pull-requests: write
  deployments: write

jobs:
  # Check if this is a release-please version bump commit (skip everything)
  check-commit:
    runs-on: ubuntu-latest
    outputs:
      is_release_commit: ${{ steps.check.outputs.is_release_commit }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check if release-please commit
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          if [[ "$COMMIT_MSG" == "chore(main): release"* ]]; then
            echo "This is a release-please version bump commit - skipping workflow"
            echo "is_release_commit=true" >> $GITHUB_OUTPUT
          else
            echo "is_release_commit=false" >> $GITHUB_OUTPUT
          fi

  release-please:
    needs: check-commit
    if: ${{ needs.check-commit.outputs.is_release_commit != 'true' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          
  deploy:
    needs: [check-commit, release-please]
    if: ${{ always() && needs.check-commit.outputs.is_release_commit != 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://watch.rudrasahoo.live
    env:
      VERCEL_ORG_ID: team_sNQdK4w7XK9YIv4v71MGY8ea
      VERCEL_PROJECT_ID: prj_GvurtLT1apyIWx5cvAa4BfLNQNni
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack (for pnpm)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome Check
        run: pnpm check

      - name: Run TypeScript check
        run: pnpm type-check

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
          NEXT_PUBLIC_LIVEKIT_URL: ${{ secrets.NEXT_PUBLIC_LIVEKIT_URL }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}

      - name: Deploy to Vercel
        id: deploy
        timeout-minutes: 10
        run: |
          # Retry logic for flaky uploads
          for i in 1 2 3; do
            echo "Deployment attempt $i..."
            OUTPUT=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
            DEPLOY_STATUS=$?
            echo "$OUTPUT"
            if [ $DEPLOY_STATUS -eq 0 ]; then
              # Extract just the URL (last https:// line from output)
              URL=$(echo "$OUTPUT" | grep -oE 'https://[^ ]+\.vercel\.app' | tail -1)
              break
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $URL"
