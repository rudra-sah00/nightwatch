name: Build Desktop Apps

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  quality:
    name: Quality Checks
    uses: ./.github/workflows/quality.yml

  build:
    name: Build (${{ matrix.platform }})
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macOS-arm64
            build_args: --mac
          - os: windows-latest
            platform: Windows-x64
            build_args: --win
          - os: ubuntu-latest
            platform: Linux-x64
            build_args: --linux

    steps:
      - name: Force LF line endings
        run: git config --global core.autocrlf false

      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Enable Corepack (for pnpm)
        run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Electron dependencies
        run: node scripts/prepare-electron-deps.js

      - name: Build and Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          # Skip electron-builder's built-in signing on macOS when no cert is
          # provided — afterPack.cjs already handles obfuscation + fuses, and
          # we re-sign with entitlements in the next step.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' && 'true' || 'false' }}
        run: pnpm exec electron-builder ${{ matrix.build_args }} --publish always

      # Re-sign the macOS .app with entitlements so the ad-hoc signature
      # covers the post-obfuscation ASAR and flipped fuses.
      - name: Re-sign macOS app with entitlements
        if: matrix.platform == 'macOS-arm64'
        run: |
          APP=$(find desktop-build/mac-arm64 -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP" ]; then
            echo "❌ .app bundle not found"
            exit 1
          fi
          echo "Re-signing: $APP"
          bash scripts/resign-mac.sh "$APP"

      - name: Upload app.asar to GitHub Release (macOS only)
        if: matrix.platform == 'macOS-arm64'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract app.asar from the built .app bundle
          ASAR_PATH=$(find desktop-build/mac-arm64 -name "app.asar" -path "*/Resources/*" | head -1)
          if [ -z "$ASAR_PATH" ]; then
            echo "❌ app.asar not found in build output"
            exit 1
          fi
          echo "Found app.asar at: $ASAR_PATH ($(du -h "$ASAR_PATH" | cut -f1))"

          # Gzip for smaller download (584MB → ~154MB)
          gzip -c "$ASAR_PATH" > "${ASAR_PATH}.gz"
          echo "Compressed: $(du -h "${ASAR_PATH}.gz" | cut -f1)"

          # Get the latest release tag
          TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          echo "Uploading app.asar.gz to release: $TAG"

          gh release upload "$TAG" "${ASAR_PATH}.gz" --clobber
