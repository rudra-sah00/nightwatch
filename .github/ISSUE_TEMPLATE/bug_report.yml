name: 🐛 Bug Report
description: Create a report to help us improve the Nightwatch platform
title: "[BUG] "
labels: ["type:bug"]
body:
  - type: checkboxes
    id: platform
    attributes:
      label: Which platform are you using?
      options:
        - label: Web Browser (Next.js)
        - label: Desktop App (Tauri — macOS/Windows/Linux)
        - label: Backend API related
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we trigger this bug?
    validations:
      required: true