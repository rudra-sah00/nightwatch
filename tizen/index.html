<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Nightwatch</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
    iframe { width: 100%; height: 100%; border: none; }
    .splash {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a0a; transition: opacity 0.5s;
    }
    .splash.hidden { opacity: 0; pointer-events: none; }
    .splash img { width: 96px; height: 96px; margin-bottom: 24px; }
    .splash h1 { color: #fff; font-family: system-ui; font-size: 2rem; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; }
    .splash .loader { margin-top: 32px; width: 40px; height: 40px; border: 4px solid #333; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .error {
      position: fixed; inset: 0; z-index: 200;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a0a; color: #fff; font-family: system-ui;
    }
    .error.visible { display: flex; }
    .error h1 { font-size: 2rem; margin-bottom: 12px; }
    .error p { color: #888; margin-bottom: 24px; }
    .error button { padding: 14px 40px; font-size: 1rem; font-weight: 700; background: #6366f1; color: #fff; border: none; border-radius: 12px; cursor: pointer; }
    .error button:focus { outline: 3px solid #fff; outline-offset: 3px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <img src="icon.png" alt="Nightwatch">
    <h1>Nightwatch</h1>
    <div class="loader"></div>
  </div>

  <div class="error" id="error">
    <h1>Unable to Connect</h1>
    <p>Please check your internet connection and try again.</p>
    <button type="button" id="retryBtn">Retry</button>
  </div>

  <iframe id="app" title="Nightwatch App" src="about:blank" allow="autoplay; encrypted-media; fullscreen"></iframe>

  <script>
    (() => {
      var APP_URL = 'https://nightwatch.in';
      var LOAD_TIMEOUT = 20000;
      var iframe = document.getElementById('app');
      var splash = document.getElementById('splash');
      var errorEl = document.getElementById('error');
      var retryBtn = document.getElementById('retryBtn');
      var timer = null;

      function load() {
        errorEl.classList.remove('visible');
        splash.classList.remove('hidden');
        iframe.src = APP_URL;
        timer = setTimeout(showError, LOAD_TIMEOUT);
      }

      function showError() {
        splash.classList.add('hidden');
        errorEl.classList.add('visible');
      }

      iframe.addEventListener('load', () => {
        clearTimeout(timer);
        try {
          if (iframe.contentWindow.location.href === 'about:blank') return;
        } catch(_e) {
          // Cross-origin means loaded successfully
        }
        splash.classList.add('hidden');
      });

      iframe.addEventListener('error', () => {
        clearTimeout(timer);
        showError();
      });

      retryBtn.addEventListener('click', load);

      // Handle Tizen back button (keyCode 10009 = XF86Back)
      document.addEventListener('keydown', (e) => {
        if (e.keyCode === 10009) {
          try {
            iframe.contentWindow.postMessage({ type: 'tizen:back' }, '*');
          } catch(_e) {
            // iframe not accessible
          }
        }
      });

      load();
    })();
  </script>
</body>
</html>
