<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nightwatch — Connecting</title>
  <style>
    body {
      background-color: #09090b;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      -webkit-app-region: drag;
    }
    .container { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
    .spinner-wrapper { position: relative; width: 4rem; height: 4rem; }
    .spinner-ring-1 { position: absolute; inset: 0; border: 4px solid #27272a; border-radius: 9999px; }
    .spinner-ring-2 { position: absolute; inset: 0; border: 4px solid transparent; border-top-color: #a855f7; border-radius: 9999px; animation: spin 1s linear infinite; }
    .spinner-ring-3 { position: absolute; inset: 0.5rem; border: 4px solid transparent; border-bottom-color: #fb7185; border-radius: 9999px; animation: spin-reverse 1.5s linear infinite; }
    .message-box { background-color: #fafafa; color: #09090b; padding: 0.5rem 1rem; border: 3px solid #27272a; }
    .message-text { font-weight: 900; text-transform: uppercase; font-size: 0.875rem; letter-spacing: 0.2em; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .retry-btn {
      -webkit-app-region: no-drag;
      display: none;
      margin-top: 0.5rem;
      padding: 0.6rem 1.5rem;
      background: #fafafa;
      color: #09090b;
      border: 3px solid #27272a;
      font-weight: 900;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: background 0.15s;
    }
    .retry-btn:hover { background: #a855f7; color: #fff; border-color: #a855f7; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes spin-reverse { to { transform: rotate(-360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner-wrapper" id="loader">
      <div class="spinner-ring-1"></div>
      <div class="spinner-ring-2"></div>
      <div class="spinner-ring-3"></div>
    </div>
    <div class="message-box" id="msg-box">
      <span class="message-text" id="msg-text">LOADING...</span>
    </div>
    <button type="button" class="retry-btn" id="retry-btn">Clear Cache & Retry</button>
    <button type="button" class="retry-btn" id="downloads-btn" style="background:#a855f7;color:#fff;border-color:#a855f7">View Downloads</button>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const targetUrl = params.get('url') || 'https://nightwatch.in';

    if (params.get('failed')) {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('msg-box').style.backgroundColor = '#09090b';
      document.getElementById('msg-box').style.color = '#fb7185';
      document.getElementById('msg-box').style.borderColor = '#fb7185';
      document.getElementById('msg-text').textContent = 'UNABLE TO CONNECT';
      document.getElementById('msg-text').style.animation = 'none';
      document.getElementById('retry-btn').style.display = 'inline-block';
      // Only show downloads button in Electron (has offline content)
      if (window.electronAPI) {
        document.getElementById('downloads-btn').style.display = 'inline-block';
      }
    } else {
      setTimeout(() => { window.location.replace(targetUrl); }, 500);
    }

    document.getElementById('retry-btn').addEventListener('click', () => {
      if (window.electronAPI?.clearCacheAndReload) {
        window.electronAPI.clearCacheAndReload();
      } else {
        window.location.replace(targetUrl);
      }
    });

    document.getElementById('downloads-btn').addEventListener('click', () => {
      // Try loading the downloads page — if network came back it'll work.
      // The did-fail-load handler will catch it if still offline.
      window.location.replace(`${targetUrl.replace(/\/$/, '')}/downloads`);
    });
  </script>
</body>
</html>
