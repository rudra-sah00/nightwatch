<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Rudra - Connection Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #0f172a;
            --muted-color: #64748b;
            --card-bg: #f8fafc;
            --border-color: #e2e8f0;
            --primary-bg: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-text: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-color: #ffffff;
                --muted-color: #a1a1aa;
                --card-bg: #000000;
                --border-color: #27272a;
                --primary-bg: #ffffff;
                --primary-hover: #e4e4e7;
                --primary-text: #000000;
            }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 48px 40px;
            max-width: 420px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-color);
            letter-spacing: -0.025em;
        }

        p {
            color: var(--muted-color);
            font-size: 15px;
            font-weight: 400;
            margin-bottom: 2.5rem;
            line-height: 1.5;
            max-width: 320px;
        }

        .spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            color: var(--muted-color);
            font-weight: 600;
            font-size: 24px;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .5; transform: scale(0.95); }
        }

        .btn {
            background-color: var(--primary-bg);
            color: var(--primary-text);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.2s ease;
            width: 100%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-family: inherit;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }
        
        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner">!</div>
        <h1>Connection Lost</h1>
        <p>We're having trouble reaching Watch Rudra's servers.<br><br>Waiting for the internet to return...</p>
        <button type="button" class="btn" onclick="retryConnection()">Try Again</button>
    </div>

    <script>
        function updateOnlineStatus() {
                                    if (navigator.onLine) {
                                        console.log('Internet back online, trying to reboot...');
                                        retryConnection();
                                    }
                                }
                                
                                function retryConnection() {
                                   const btn = document.querySelector('.btn');
                                   btn.innerText = 'Connecting...';
                                   btn.style.backgroundColor = 'var(--primary-hover)';
                                    
                                    // Wait a brief moment for DNS to catch up before loading
                                    setTimeout(() => {
                                        if (window.electronAPI) {
                                            window.electronAPI.retryConnection();
                                        } else {
                                            window.location.reload();
                                        }
                                    }, 1000);
                                }

                                window.addEventListener('online', updateOnlineStatus);
                                
                                // Polling as a secondary fallback strategy
                                setInterval(() => {
                                    if (navigator.onLine) retryConnection();
                                }, 5000);
    </script>
</body>
</html>
