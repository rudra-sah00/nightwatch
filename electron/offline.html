<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Rudra - Connection Error</title>
    <style>
        body {
            background-color: #09090b;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 {
            margin-top: 1rem;
            font-size: 2rem;
            font-weight: 700;
            color: #f87171;
        }

        p {
            color: #a1a1aa;
            margin-bottom: 2rem;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn {
            background-color: #27272a;
            color: white;
            border: 1px solid #3f3f46;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
            text-decoration: none;
        }

        .btn:hover {
            background-color: #3f3f46;
        }
    </style>
</head>
<body>
    <div>
        <div class="spinner" id="spinner"></div>
        <h1>Connection Lost</h1>
        <p>We're having trouble connecting to Watch Rudra's servers.<br>Waiting for the internet connection to return...</p>
        <button type="button" class="btn" onclick="retryConnection()">Try Again</button>
    </div>

    <script>
        function updateOnlineStatus() {
            if (navigator.onLine) {
                console.log('Internet back online, trying to reboot...');
                retryConnection();
            }
        }
        
        function retryConnection() {
            const spinner = document.getElementById('spinner');
            spinner.style.borderLeftColor = '#3b82f6';
            
            // Wait a brief moment for DNS to catch up before loading
            setTimeout(() => {
                if (window.electronAPI) {
                    window.electronAPI.retryConnection();
                } else {
                    window.location.reload();
                }
            }, 1000);
        }

        window.addEventListener('online', updateOnlineStatus);
        
        // Polling as a secondary fallback strategy
        setInterval(() => {
            if (navigator.onLine) retryConnection();
        }, 5000);
    </script>
</body>
</html>
